# TransferFlow — deploy as two Railway services from this repo:
# 1. API  - root directory apps/api,  start: bun run start
# 2. Web  - root directory apps/web,  build: bun run build, start: bunx serve dist -l $PORT
#
# Add Redis and a bucket (S3-compatible) in the same Railway project.
# Wire REDIS_URL and S3_* env vars on the API service.
# API service:  WEB_ORIGIN=https://transferflow.bramsuurd.nl
# Web service:  VITE_API_URL=https://api.transferflow.bramsuurd.nl  (rebuild after changing)
# After first deploy: cd apps/api && railway run --service api bun run configure-cors
